<!doctype html>
<html lang="en" class="dark" style="background:#0D1117;color:#E6EDF3">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Loco — Smart Life Journal</title>
    <meta name="description" content="Write once, track everywhere. Expenses, health, goals, reminders — all from one journal." />
    <meta name="theme-color" content="#0D1117" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Loco — Smart Life Journal" />
    <meta property="og:description" content="Write once, track everywhere. The zero-friction life tracker." />
    <meta property="og:type" content="website" />

    <!-- Google Fonts: Playfair Display + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="margin:0;background:#0D1117;font-family:'DM Sans',system-ui,sans-serif">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.warn('[SW] Registration failed:', err)
          })
        })
      }
    </script>
  </body>
</html>
